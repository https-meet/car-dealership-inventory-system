<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Car body (main hull) -->
  <rect x="10" y="30" width="44" height="14" rx="4" fill="white"/>

  <!-- Car cabin -->
  <path d="M18 30 L22 20 Q24 18 27 18 L37 18 Q40 18 42 20 L46 30 Z" fill="white"/>

  <!-- Windows (cabin cutout) -->
  <path d="M22 28 L25 21 Q26 20 28 20 L36 20 Q38 20 39 21 L42 28 Z" fill="#0f172a"/>
  <!-- Window divider -->
  <line x1="32" y1="20" x2="32" y2="28" stroke="#0f172a" stroke-width="1.5"/>

  <!-- Left wheel -->
  <circle cx="20" cy="44" r="6" fill="#0f172a"/>
  <circle cx="20" cy="44" r="3.5" fill="#94a3b8"/>
  <circle cx="20" cy="44" r="1.5" fill="#0f172a"/>

  <!-- Right wheel -->
  <circle cx="44" cy="44" r="6" fill="#0f172a"/>
  <circle cx="44" cy="44" r="3.5" fill="#94a3b8"/>
  <circle cx="44" cy="44" r="1.5" fill="#0f172a"/>

  <!-- Headlight left -->
  <rect x="10" y="33" width="5" height="3" rx="1.5" fill="#fbbf24"/>

  <!-- Taillight right -->
  <rect x="49" y="33" width="5" height="3" rx="1.5" fill="#f87171"/>

  <!-- Door line detail -->
  <line x1="27" y1="30" x2="27" y2="41" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="0"/>
  <line x1="37" y1="30" x2="37" y2="41" stroke="#e2e8f0" stroke-width="1"/>
</svg>